<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<link rel="icon" type="image/svg+xml" href="/vite.svg" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />

		<link rel="stylesheet" href="./src/resources/style.css" />

		<title>noise-widget</title>
	</head>
	<body>
		<div class="page">
			<div class="layout">
				<div class="inline sb center">
					<h1>noise-widget</h1>
				</div>
				<span class="subtitle">
					A simple noise generator, using Rust and the noise crate.
				</span>

				<h3>controls</h3>
				<div class="container controls">
					<div class="grid-cell">
						<label
							>helper
							<button class="button" id="randomise">
								randomise
							</button>
						</label>

						<label>
							<button class="button" id="reset">reset</button>
						</label>
						<label
							>seed
							<input
								type="number"
								id="seed"
								value="30505"
								min="0"
								max="99999"
							/>
						</label>

						<label>
							<select id="noise-type" name="noise-type">
								<option value="0">Perlin</option>
								<option value="1">Simplex</option>
								<option value="2">Worley</option>
								<option value="3">Ridged</option>
							</select>
						</label>
					</div>

					<span class="vert-row"></span>

					<div class="grid-cell">
						<label
							>scale
							<span class="data-label" id="scale-val">50</span>
							<input
								type="range"
								id="scale"
								min="50"
								max="200"
								value="50"
							/>
						</label>

						<label
							>z slice
							<span class="data-label" id="z-val">0.00</span>
							<input
								type="range"
								id="z"
								min="0"
								max="100"
								value="0"
							/>
						</label>
					</div>

					<div class="grid-cell">
						<label
							>offset x speed
							<span class="data-label" id="offsetX-val">0</span>
							<input
								type="range"
								id="offsetX"
								min="-10"
								max="10"
								value="0"
							/>
						</label>
						<label
							>offset y speed
							<span class="data-label" id="offsetY-val">0</span>
							<input
								type="range"
								id="offsetY"
								min="-10"
								max="10"
								value="0"
							/>
						</label>
					</div>
				</div>

				<h3>output</h3>
				<div class="container">
					<canvas id="canvas"></canvas>
				</div>
			</div>
		</div>

		<script type="module" src="/src/index.ts"></script>
	</body>
</html>
